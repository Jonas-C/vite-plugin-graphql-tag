name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
          RANGE="origin/${GITHUB_BASE_REF}...${GITHUB_SHA}"
          REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([A-Za-z0-9._/-]+\))?!?: .+'
          FAILED=0

          while IFS= read -r message; do
            [ -z "$message" ] && continue
            if [[ ! "$message" =~ $REGEX ]]; then
              echo "Invalid commit message: $message"
              FAILED=1
            fi
          done < <(git log --format=%s "$RANGE")

          if [ "$FAILED" -ne 0 ]; then
            echo "Commit messages must follow Conventional Commits."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test --reporter=dot
